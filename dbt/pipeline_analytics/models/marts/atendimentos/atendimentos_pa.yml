version: 2

models:
  - name: atendimentos_pa
    tests:
      - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - atend_PA
                  - competencia
    columns:
      - name: atend_PA
        tests:
          - not_null
      - name: fl_conversao
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0,1]
                quote: false
      - name: fl_evasao
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0,1]
                quote: false
      - name: fl_retorno_48h
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0,1]
                quote: false
      - name: competencia
        tests:
          - not_null
      - name: turno
        tests:
          - accepted_values:
              arguments:
                values: ["Manhã", "Tarde", "Noite", "Madrugada"]
      - name: faixa_etaria
        tests:
          - accepted_values:
              arguments:
                values: ["0 a 2", "3 a 5", "6 a 8", "9 a 11", "12 a 14", "15 a 19", "20 a 29", "30 a 39", "40 a 49", "50 a 59", "60 ou mais"]