version: 2

models:
  - name: ranking_especialidades
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - SERVICO
            - competencia
    columns:
      - name: SERVICO
        tests:
          - not_null
      - name: competencia
        tests:
          - not_null
      - name: total_pontos
        tests:
          - not_null
      - name: conversao
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1,2,3,4,5,6]
                quote: false
      - name: alta_na_meta
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1,2,3,4,5,6]
                quote: false
      - name: tempo_atend_medico
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1,2,3,4,5,6]
                quote: false
      - name: evasao
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1,2,3,4,5,6]
                quote: false
      - name: retorno48h
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1,2,3,4,5,6]
                quote: false
